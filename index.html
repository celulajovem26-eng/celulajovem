<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página oficial da Célula Jovem com acesso aos grupos e materiais dos encontros.">

    <title>Célula Jovem</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Botão voltar ao topo -->
    <button id="topBtn" aria-label="Voltar ao topo">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Cabeçalho -->
    <header class="header fade-in">
        <img src="logo.png" alt="Logo da Célula Jovem" class="logo" loading="lazy">
        <h1>Célula Jovem</h1>
    </header>

    <!-- Seção de Links -->
    <section class="cards-container fade-in">

        <!-- Card 1 -->
        <article class="card">
            <i class="fab fa-whatsapp icon"></i>
            <h2>Grupo do WhatsApp</h2>
            <p>Entre no grupo oficial da Célula Jovem.</p>
            <a href="https://chat.whatsapp.com/CwXbafccRAq4pQxnvc7XaS?s=cl&p=i&mlu=1&amv=0"
               target="_blank"
               rel="noopener noreferrer">
                Entrar no WhatsApp
            </a>
        </article>

        <!-- Card 2 -->
        <article class="card">
            <i class="fas fa-folder icon"></i>
            <h2>1º Encontro CJ</h2>
            <p>Materiais e arquivos do primeiro encontro.</p>
            <a href="https://drive.google.com/drive/folders/1z_CFyJZphtLAFYateZmdteRm7N7gXSjM"
               target="_blank"
               rel="noopener noreferrer">
                Abrir Pasta
            </a>
        </article>

        <!-- Card 3 -->
        <article class="card">
            <i class="fas fa-folder-open icon"></i>
            <h2>2º Encontro CJ</h2>
            <p>Materiais e arquivos do segundo encontro.</p>
            <a href="https://drive.google.com/drive/folders/1LglDomAscQR_LcEO_rwDnU0cFDg3f7xh"
               target="_blank"
               rel="noopener noreferrer">
                Abrir Pasta
            </a>
        </article>

    </section>

    <!-- Rodapé -->
    <footer class="fade-in">
        &copy; 2026 Célula Jovem
    </footer>

    <script src="script.js"></script>
</body>
</html>
